<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kh Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Quintessential&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Prioritizing Zapf Chancery for that exact 'KH' look */
            font-family: "Zapf Chancery", "Apple Chancery", "Quintessential", cursive;
        }

        .intro-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeInPage 3s forwards;
        }

        .bg-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Subtle 'pulse' zoom to make it look alive */
            animation: slowZoom 15s infinite alternate ease-in-out;
        }

        /* The Overlay Button */
        .enter-btn {
            position: relative;
            z-index: 10;
            padding: 10px 40px;
            font-size: 2.5rem;
            font-style: italic;
            color: #fff;
            background: none;
            border: none;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 2px 4px 10px rgba(0, 0, 0, 0.9);
            transition: all 0.8s ease;
            margin-top: 140px; /* Positioned below your image's text */
        }

        .enter-btn:hover {
            letter-spacing: 5px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }

        /* Cool Entry Animations */
        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        /* Subtle glow animation for the button text */
        .enter-btn {
            animation: glowText 4s infinite alternate;
        }

        @keyframes glowText {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="intro-wrapper">
        <img src="khpjp.jpg" alt="KH Cafe" class="bg-image">
        
        <button class="enter-btn" onclick="startExperience()">ENTER</button>
    </div>

    <script>
        function startExperience() {
            // Smooth transition effect
            document.querySelector('.intro-wrapper').style.transition = "all 1.5s ease";
            document.querySelector('.intro-wrapper').style.filter = "brightness(0) blur(10px)";
            
            setTimeout(() => {
                alert("Welcome to the world of KH Cafe.");
                // window.location.href = "home.html"; // Your destination page
            }, 1500);
        }
    </script>

</body>
</html>
