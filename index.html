<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kh Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Quintessential&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Zapf Chancery", "Apple Chancery", "Quintessential", cursive;
        }
        .intro-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeInPage 3s forwards;
        }
        .bg-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .enter-btn {
            position: relative;
            z-index: 10;
            padding: 10px 40px;
            font-size: 2.5rem;
            font-family: "Cormorant Garamond", serif;
            font-style: normal;
            font-weight: 600;
            color: #E0E0E0;
            background: none;
            border: none;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255,255,255,0.4), 2px 4px 10px rgba(0,0,0,0.9);
            transition: all 0.8s ease;
            margin-top: 140px;
            animation: glowText 4s infinite alternate;
        }
        .enter-btn:hover {
            letter-spacing: 5px;
            text-shadow: 0 0 25px rgba(255,255,255,0.8);
            transform: scale(1.05);
        }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        @keyframes glowText { from { opacity: 0.8; } to { opacity: 1; } }
    </style>
</head>
